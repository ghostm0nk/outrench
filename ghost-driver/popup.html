<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      background: #0f0c08;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      border: 1px solid rgba(245,158,11,0.2);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: #f59e0b;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(245,158,11,0.5);
    }
    .status-card {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .label { color: rgba(255,255,255,0.4); }
    .value { font-weight: 600; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .active { background: #10b981; box-shadow: 0 0 5px #10b981; }
    .inactive { background: #ef4444; }
    .profile-box {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
      object-fit: cover;
    }
    .handle { color: #f59e0b; font-size: 11px; font-family: monospace; }
    .footer {
      margin-top: 16px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">👻</div>
    <div style="font-weight: 700; font-size: 14px;">Ghost Driver</div>
  </div>

  <div class="status-card">
    <div class="status-item">
      <span class="label">Spirit Connection</span>
      <span class="value"><span class="status-dot active"></span>Linked</span>
    </div>
    <div class="status-item">
      <span class="label">Twitter Session</span>
      <span class="value" id="twitter-status">Searching...</span>
    </div>

    <div id="profile-display" style="display: none;">
      <div class="profile-box">
        <img id="profile-avatar" class="avatar" src="" />
        <div>
          <div id="profile-name" style="font-size: 13px; font-weight: 600;"></div>
          <div id="profile-handle" class="handle"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Ghost Driver acts as your browser bridge.<br/>
    Keep a Twitter tab open for best results.
  </div>

  <script src="popup.js"></script>
</body>
</html>
